    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>
    <!-- TELA DE CARREGAMENTO -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-content">
            <img src="images/logo.png" alt="Elena Store" class="loading-logo">
            <div class="loading-spinner"></div>
            <p class="loading-text">Carregando promoção<span class="loading-dots"></span></p>
            <div class="loading-bar-wrapper">
                <div class="loading-bar" id="loadingBar"></div>
            </div>
        </div>
    </div>

    <!-- CONTEÚDO PRINCIPAL -->
    <div class="container" id="mainContent" style="display: none;">
        <!-- Logo -->
        <img src="images/logo.png" alt="Elena Store" class="logo">

        <!-- Badge -->
        <div class="badge">
            <span class="dot"></span>
            🔥 QUEIMA DE ESTOQUE — OFERTA DO DIA
        </div>

        <!-- Headers -->
        <h1 class="main-title">Queima de Estoque!</h1>
        <p class="subtitle">Todo conjunto fitness por</p>
        <h2 class="free-title" style="font-size: 2rem; color: #e60023; letter-spacing: 1px;">R$ 49,90</h2>
        <p class="subtitle" style="font-size: 0.85rem; margin-top: 2px;">+ <b style="color: #00a85f;">PRIMEIRO FRETE GRÁTIS</b></p>

        <!-- Timer Section -->
        <div class="timer-section">
            <p class="timer-label">PROMOÇÃO ACABA EM</p>
            <div class="timer-display">
                <div class="time-block" id="hours">00</div>
                <span class="separator">:</span>
                <div class="time-block" id="minutes">00</div>
                <span class="separator">:</span>
                <div class="time-block" id="seconds">00</div>
            </div>
            <p class="warning-text">⚠️ Promoção válida somente até 23:59 de hoje!</p>
        </div>

        <!-- CTA -->
        <button class="cta-button" onclick="window.location.href='colecao.html'">
            APROVEITAR OFERTA <span class="arrow">→</span>
        </button>
        <p class="footer-text">Preço único R$ 49,90 qualquer conjunto. Corra, estoque limitado!</p>
    </div>

    <!-- Scripts -->
    <script>
        // Loading Screen Logic (5 seconds)
        document.addEventListener('DOMContentLoaded', () => {
            const loadingBar = document.getElementById('loadingBar');
            const loadingScreen = document.getElementById('loadingScreen');
            const mainContent = document.getElementById('mainContent');

            // Animate loading bar over 5 seconds
            let progress = 0;
            const loadInterval = setInterval(() => {
                progress += 2;
                loadingBar.style.width = progress + '%';
                if (progress >= 100) {
                    clearInterval(loadInterval);
                }
            }, 100);

            setTimeout(() => {
                loadingScreen.style.opacity = '0';
                loadingScreen.style.transform = 'scale(1.05)';
                setTimeout(() => {
                    loadingScreen.style.display = 'none';
                    mainContent.style.display = 'flex';
                    mainContent.style.animation = 'fadeInPage 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards';
                }, 400);
            }, 5000);

            // Countdown Timer until 23:59 (resets daily)
            function updateCountdown() {
                const now = new Date();
                const endOfDay = new Date();
                endOfDay.setHours(23, 59, 59, 999);

                const diff = endOfDay - now;
                if (diff <= 0) {
                    document.getElementById('hours').textContent = '00';
                    document.getElementById('minutes').textContent = '00';
                    document.getElementById('seconds').textContent = '00';
                    return;
                }

                const hours = Math.floor(diff / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);

                document.getElementById('hours').textContent = hours.toString().padStart(2, '0');
                document.getElementById('minutes').textContent = minutes.toString().padStart(2, '0');
                document.getElementById('seconds').textContent = seconds.toString().padStart(2, '0');
            }

            updateCountdown();
            setInterval(updateCountdown, 1000);
        });
    </script>
</body>

</html>
