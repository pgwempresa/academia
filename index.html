<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elena Store - Queima de Estoque</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap"

    <link rel="stylesheet" href="style.css">

<body>
    <!-- TELA DE CARREGAMENTO -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-content">
            <img src="images/logo.png" alt="Elena Store" class="loading-logo">
            <div class="loading-spinner"></div>
            <p class="loading-text">Carregando promoção<span class="loading-dots"></span></p>
            <div class="loading-bar-wrapper">
                <div class="loading-bar" id="loadingBar"></div>
            </div>
        </div>
    </div>

    <!-- CONTEÚDO PRINCIPAL -->
    <div class="container" id="mainContent" style="display: none;">
        <!-- Logo -->
        <img src="images/logo.png" alt="Elena Store" class="logo">

        <!-- Badge -->
        <div class="badge">
            <span class="dot"></span>
            🔥 QUEIMA DE ESTOQUE — OFERTA DO DIA
        </div>

        <!-- Headers -->
        <h1 class="main-title">Queima de Estoque!</h1>
        <p class="subtitle">Todo conjunto fitness por</p>
        <h2 class="free-title" style="font-size: 2rem; color: #e60023; letter-spacing: 1px;">R$ 49,90</h2>
        <p class="subtitle" style="font-size: 0.85rem; margin-top: 2px;">+ <b style="color: #00a85f;">PRIMEIRO FRETE GRÁTIS</b></p>

        <!-- Timer Section -->
        <div class="timer-section">
            <p class="timer-label">PROMOÇÃO ACABA EM</p>
            <div class="timer-display">
                <div class="time-block" id="hours">00</div>
                <span class="separator">:</span>
                <div class="time-block" id="minutes">00</div>
                <span class="separator">:</span>
                <div class="time-block" id="seconds">00</div>
            </div>
            <p class="warning-text">⚠️ Promoção válida somente até 23:59 de hoje!</p>
        </div>

        <!-- CTA -->
        <button class="cta-button" onclick="window.location.href='colecao.html'">
            APROVEITAR OFERTA <span class="arrow">→</span>
        </button>
        <p class="footer-text">Preço único R$ 49,90 qualquer conjunto. Corra, estoque limitado!</p>
    </div>

    <!-- Fire Canvas -->
    <canvas id="fireCanvas" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; display: none;"></canvas>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        // Loading Screen Logic (5 seconds)
        document.addEventListener('DOMContentLoaded', () => {
            const loadingBar = document.getElementById('loadingBar');
            const loadingScreen = document.getElementById('loadingScreen');
            const mainContent = document.getElementById('mainContent');
            const fireCanvas = document.getElementById('fireCanvas');

            // Animate loading bar over 5 seconds
            let progress = 0;
            const loadInterval = setInterval(() => {
                progress += 2;
                loadingBar.style.width = progress + '%';
                if (progress >= 100) {
                    clearInterval(loadInterval);
                }
            }, 100);

            setTimeout(() => {
                loadingScreen.style.opacity = '0';
                loadingScreen.style.transform = 'scale(1.05)';
                setTimeout(() => {
                    loadingScreen.style.display = 'none';
                    mainContent.style.display = 'flex';
                    mainContent.style.animation = 'fadeInPage 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards';
                    
                    // 🎉 Confetti burst (fire-themed colors!)
                    const fireColors = ['#e60023', '#ff4500', '#ff6b35', '#ffa500', '#ffd700', '#ffec00'];
                    
                    // Big initial burst
                    confetti({
                        particleCount: 150,
                        spread: 90,
                        origin: { y: 0.6 },
                        colors: fireColors
                    });
                    
                    // Continuous confetti for 4 seconds
                    const duration = 4000;
                    const animEnd = Date.now() + duration;
                    const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 10 };

                    function randomInRange(min, max) {
                        return Math.random() * (max - min) + min;
                    }

                    const confettiInterval = setInterval(() => {
                        const timeLeft = animEnd - Date.now();
                        if (timeLeft <= 0) return clearInterval(confettiInterval);

                        const particleCount = 40 * (timeLeft / duration);
                        confetti(Object.assign({}, defaults, {
                            particleCount,
                            origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 },
                            colors: fireColors
                        }));
                        confetti(Object.assign({}, defaults, {
                            particleCount,
                            origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 },
                            colors: fireColors
                        }));
                    }, 250);

                    // 🔥 Fire particle effect
                    fireCanvas.style.display = 'block';
                    startFireEffect();
                }, 400);
            }, 5000);

            // 🔥 FIRE PARTICLE EFFECT
            function startFireEffect() {
                const canvas = fireCanvas;
                const ctx = canvas.getContext('2d');
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;

                window.addEventListener('resize', () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                });

                const particles = [];
                const maxParticles = 60;

                class FireParticle {
                    constructor() {
                        this.reset();
                    }
                    reset() {
                        this.x = Math.random() * canvas.width;
                        this.y = canvas.height + 10;
                        this.size = Math.random() * 4 + 2;
                        this.speedY = Math.random() * 2 + 0.5;
                        this.speedX = (Math.random() - 0.5) * 1;
                        this.opacity = Math.random() * 0.5 + 0.3;
                        this.life = 0;
                        this.maxLife = Math.random() * 120 + 60;
                        const colors = [
                            [230, 0, 35],    // red
                            [255, 69, 0],    // orange-red
                            [255, 107, 53],  // orange
                            [255, 165, 0],   // orange
                            [255, 215, 0],   // gold
                            [255, 236, 0],   // yellow
                        ];
                        this.color = colors[Math.floor(Math.random() * colors.length)];
                    }
                    update() {
                        this.y -= this.speedY;
                        this.x += this.speedX + Math.sin(this.life * 0.05) * 0.3;
                        this.life++;
                        this.opacity = (1 - this.life / this.maxLife) * 0.5;
                        this.size *= 0.998;
                        if (this.life >= this.maxLife || this.opacity <= 0) {
                            this.reset();
                        }
                    }
                    draw() {
                        ctx.beginPath();
                        const gradient = ctx.createRadialGradient(
                            this.x, this.y, 0,
                            this.x, this.y, this.size * 2
                        );
                        gradient.addColorStop(0, `rgba(${this.color[0]}, ${this.color[1]}, ${this.color[2]}, ${this.opacity})`);
                        gradient.addColorStop(1, `rgba(${this.color[0]}, ${this.color[1]}, ${this.color[2]}, 0)`);
                        ctx.fillStyle = gradient;
                        ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }

                for (let i = 0; i < maxParticles; i++) {
                    const p = new FireParticle();
                    p.y = Math.random() * canvas.height;
                    p.life = Math.random() * p.maxLife;
                    particles.push(p);
                }

                function animate() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    particles.forEach(p => {
                        p.update();
                        p.draw();
                    });
                    requestAnimationFrame(animate);
                }
                animate();
            }

            // Countdown Timer until 23:59 (resets daily)
            function updateCountdown() {
                const now = new Date();
                const endOfDay = new Date();
                endOfDay.setHours(23, 59, 59, 999);

                const diff = endOfDay - now;
                if (diff <= 0) {
                    document.getElementById('hours').textContent = '00';
                    document.getElementById('minutes').textContent = '00';
                    document.getElementById('seconds').textContent = '00';
                    return;
                }

                const hours = Math.floor(diff / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);

                document.getElementById('hours').textContent = hours.toString().padStart(2, '0');
                document.getElementById('minutes').textContent = minutes.toString().padStart(2, '0');
                document.getElementById('seconds').textContent = seconds.toString().padStart(2, '0');
            }

            updateCountdown();
            setInterval(updateCountdown, 1000);
        });
    </script>
</body>

</html>
